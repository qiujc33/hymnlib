<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>敬拜诗歌库</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <h1>敬拜诗歌库</h1>
    <p>诗歌乐谱资源</p>
  </header>

  <main class="main-content">

    <div class="search-row">
      <input type="text" id="search-input" class="search-input" placeholder="搜索诗歌名称…">
    </div>

    <div class="controls-row">
      <div class="controls-left">
        <button id="filter-toggle" class="filter-toggle-btn" aria-controls="filter-drawer">筛选</button>
        <span id="results-count" class="results-count"></span>
      </div>
      <div class="controls-right">
        <button id="setlist-fab" class="setlist-btn" style="display:none">选曲 (0)</button>
        <div class="view-toggle">
          <button id="view-grid-btn" class="view-btn active" title="卡片视图">▦</button>
          <button id="view-list-btn" class="view-btn" title="列表视图">☰</button>
        </div>
      </div>
    </div>

    <div id="song-grid" class="song-grid" style="display:none"></div>
    <div id="song-list" class="song-list" style="display:none"></div>

    <div id="loading-state" class="state-message">正在加载诗歌库…</div>
    <div id="error-state" class="state-message state-error" style="display:none">
      加载失败，请检查网络连接或联系管理员。
    </div>
    <div id="setup-state" class="state-message state-setup" style="display:none">
      <strong>尚未配置数据源。</strong><br><br>
      请在 <code>config.js</code> 中填入 Google 表格 CSV 链接。
    </div>

  </main>

  <!-- PDF Viewer Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-group">
          <h2 id="modal-title-cn"></h2>
          <p id="modal-title-en" class="modal-subtitle"></p>
        </div>
        <div id="pdf-controls" class="pdf-controls" style="display:none">
          <button id="pdf-zoom-out" class="pdf-ctrl-btn" aria-label="缩小">−</button>
          <span id="pdf-zoom-label" class="pdf-zoom-label">适合宽度</span>
          <button id="pdf-zoom-in" class="pdf-ctrl-btn" aria-label="放大">+</button>
          <button id="pdf-fit" class="pdf-ctrl-btn" title="整页 / 适合宽度">⤢</button>
        </div>
        <button id="modal-close" class="modal-close-btn" aria-label="关闭">✕</button>
      </div>
      <div class="modal-viewer">
        <div id="pdf-pages" class="pdf-pages" aria-label="乐谱预览"></div>
        <div id="no-pdf-msg" class="no-pdf-msg" style="display:none">此诗歌暂无乐谱文件。</div>
      </div>
      <div class="modal-footer">
        <div class="modal-meta">
          <div id="modal-tags" class="modal-tags"></div>
          <p id="modal-notes" class="modal-notes"></p>
        </div>
        <div class="modal-actions">
          <button id="modal-setlist-btn" class="btn-setlist-toggle">加入选曲</button>
          <a id="download-btn" href="#" class="btn-download" download>下载乐谱</a>
        </div>
      </div>
    </div>
  </div>



  <!-- Filter Drawer -->
  <aside id="filter-drawer" class="filter-drawer">
    <div class="filter-drawer-header">
      <h3>筛选</h3>
      <button id="filter-drawer-close" class="modal-close-btn" aria-label="关闭">✕</button>
    </div>
    <div class="filter-drawer-body">
      <div class="filters-header">
        <span class="filters-title">标签</span>
        <button id="tag-ref-btn" class="btn-text">标签参考 ▾</button>
      </div>
      <div id="tag-reference" class="tag-reference" style="display:none"></div>
      <section class="filters-section" id="filters-section"></section>
    </div>
    <div class="filter-drawer-footer">
      <button id="clear-filters-btn" class="btn-text" style="display:none">清除筛选</button>
    </div>
  </aside>
  <div id="filter-overlay" class="filter-overlay"></div>

  <!-- Setlist Panel -->
  <div id="setlist-panel" class="setlist-panel">
    <div class="setlist-header">
      <h3>诗歌顺序</h3>
      <div class="setlist-header-actions">
        <button id="setlist-clear" class="btn-text" style="display:none">清空</button>
        <button id="setlist-panel-close" class="modal-close-btn" aria-label="关闭">✕</button>
      </div>
    </div>
    <div id="setlist-body" class="setlist-body">
      <p class="setlist-empty">尚未选择诗歌</p>
    </div>
    <div class="setlist-footer">
      <button id="setlist-download" class="btn-download" style="display:none">下载合并PDF</button>
    </div>
  </div>
  <div id="setlist-overlay" class="setlist-overlay"></div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
